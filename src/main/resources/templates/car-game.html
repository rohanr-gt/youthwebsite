<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR RUSH 3D (React Edition) | Zentrix</title>
    <!-- Favicon -->
    <link rel="shortcut icon" type="image/png" href="/images/carL.png">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">

    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #root {
            position: absolute;
            inset: 0;
            z-index: 100;
            pointer-events: none;
        }

        canvas {
            display: block;
        }

        /* HUD Styles */
        .hud-container {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
        }

        .hud-card {
            background: rgba(15, 20, 35, 0.8);
            border-left: 4px solid #00f2ff;
            padding: 10px 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .hud-label {
            font-size: 11px;
            color: #00f2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .hud-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
        }

        .speedometer {
            position: absolute;
            bottom: 40px;
            right: 40px;
            text-align: right;
        }

        .speed-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 72px;
            font-weight: 900;
            color: #00f2ff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        /* Overlays */
        .overlay-screen {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 20, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            pointer-events: all;
            z-index: 1000;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(180deg, #fff, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 15px;
            margin-bottom: 5px;
        }

        .game-btn {
            background: transparent;
            border: 2px solid #00f2ff;
            color: #00f2ff;
            padding: 18px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 40px;
        }

        .game-btn:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 50px #00f2ff;
            transform: scale(1.05);
        }

        .controls-hint {
            margin-top: 60px;
            display: flex;
            gap: 40px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            letter-spacing: 2px;
        }

        .controls-hint b {
            color: #00f2ff;
            margin-right: 5px;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1100;
            pointer-events: all;
        }
    </style>
</head>

<body>

    <div id="game-canvas-container"></div>
    <div id="root"></div>

    <!-- REACT UI -->
    <script type="text/babel">
        /*<![CDATA[*/
        const { useState, useEffect } = React;

        const GameUI = () => {
            const [gameState, setGameState] = useState('START'); // START, PLAYING, GAMEOVER
            const [score, setScore] = useState(0);
            const [distance, setDistance] = useState(0);
            const [speed, setSpeed] = useState(0);

            useEffect(() => {
                // Listen for game engine updates
                const handleUpdate = (e) => {
                    const data = e.detail;
                    setScore(data.score);
                    setDistance(data.distance);
                    setSpeed(data.speed);
                    if (data.state) setGameState(data.state);
                };

                window.addEventListener('gameUpdate', handleUpdate);
                return () => window.removeEventListener('gameUpdate', handleUpdate);
            }, []);

            const startGame = () => {
                window.dispatchEvent(new CustomEvent('controlCommand', { detail: 'START' }));
            };

            const restartGame = () => {
                location.reload();
            };

            return (
                <React.Fragment>
                    <a href="/games" className="back-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                        GARAGE
                    </a>

                    {gameState === 'START' && (
                        <div className="overlay-screen">
                            <div className="game-title">CAR RUSH</div>
                            <div style={{ color: 'rgba(255,255,255,0.4)', fontSize: '14px', letterSpacing: '5px' }}>HIGH-FIDELITY 3D SURVIVAL</div>
                            <button className="game-btn" onClick={startGame}>START ENGINE</button>
                            <div className="controls-hint">
                                <div><b>↑/↓</b> ACCEL / BRAKE</div>
                                <div><b>←/→</b> STEER</div>
                                <div><b>SPACE</b> DRIFT</div>
                            </div>
                        </div>
                    )}

                    {gameState === 'GAMEOVER' && (
                        <div className="overlay-screen" style={{ background: 'rgba(30, 0, 0, 0.95)' }}>
                            <div className="game-title" style={{ background: 'linear-gradient(180deg, #fff, #ff0044)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>CRASHED</div>
                            <div className="hud-value" style={{ fontSize: '40px', marginTop: '20px' }}>SCORE: {score}</div>
                            <button className="game-btn" style={{ borderColor: '#ff0044', color: '#ff0044' }} onClick={restartGame}>RESTART</button>
                        </div>
                    )}

                    {gameState === 'PLAYING' && (
                        <React.Fragment>
                            <div className="hud-container">
                                <div className="hud-card">
                                    <div className="hud-label">Score</div>
                                    <div className="hud-value">{score}</div>
                                </div>
                                <div className="hud-card">
                                    <div className="hud-label">Distance</div>
                                    <div className="hud-value">{distance}m</div>
                                </div>
                            </div>

                            <div className="speedometer">
                                <div className="speed-val">{speed}</div>
                                <div className="hud-label" style={{ fontSize: '14px' }}>KM/H</div>
                                <div style={{ width: '200px', height: '4px', background: 'rgba(0, 242, 255, 0.2)', marginTop: '10px' }}>
                                    <div style={{ width: `${Math.min(100, (speed / 250) * 100)}%`, height: '100%', background: '#00f2ff', boxShadow: '0 0 10px #00f2ff' }}></div>
                                </div>
                            </div>
                        </React.Fragment>
                    )}
                </React.Fragment>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<GameUI />);
        /*]]>*/
    </script>


    <!-- 3D ENGINE (THREE.JS) -->
    <script th:inline="none">
        /* CAR RUSH 3D - ENGINE REBORN */

        const SETTINGS = {
            lanes: [25, 0, -25], // 0: Left (+X), 1: Center, 2: Right (-X)
            trafficSpawnRate: 0.015,
            accelRate: 0.005,
            brakeRate: 0.012,
            friction: 0.992,
            maxSpeed: 3.5,
            minSpeed: 0,
            treeSpawnFreq: 0.2, // Roadside tree frequency
        };

        let scene, camera, renderer, clock;
        let ground, road, player, traffic = [];
        let scenery = []; // Trees/Objects
        let gameState = 'START';
        let score = 0, distance = 0, currentSpeed = 0;
        let keys = {};

        // Texture Loaders
        const texLoader = new THREE.TextureLoader();
        const carTex = texLoader.load('/images/car1.png');
        const bgTex = texLoader.load('/images/bg.png'); // Village backdrop

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0a0f, 0.0008);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.set(0, 15, -35);
            camera.lookAt(0, 5, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-canvas-container').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(50, 200, 100);
            scene.add(mainLight);

            createWorld();
            createPlayer();

            window.addEventListener('resize', onResize);
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            // Listen for React UI commands
            window.addEventListener('controlCommand', (e) => {
                if (e.detail === 'START') gameState = 'PLAYING';
            });

            animate();
        }

        function createWorld() {
            // Grass Plane (Vast Environment)
            const grassGeo = new THREE.PlaneGeometry(2000, 4000);
            const grassMat = new THREE.MeshPhongMaterial({ color: 0x1a3300 });
            const grass = new THREE.Mesh(grassGeo, grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.position.y = -0.5;
            scene.add(grass);

            // Highway Model
            road = new THREE.Group();
            const asphaltGeo = new THREE.PlaneGeometry(100, 4000);
            const asphaltMat = new THREE.MeshStandardMaterial({
                color: 0x111115,
                roughness: 0.8,
                metalness: 0.2
            });
            const mesh = new THREE.Mesh(asphaltGeo, asphaltMat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.receiveShadow = true;
            road.add(mesh);

            // Lane Markings
            const lineGeo = new THREE.PlaneGeometry(1.5, 40);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for (let i = -20; i < 20; i++) {
                [-12.5, 12.5].forEach(lx => {
                    const l = new THREE.Mesh(lineGeo, lineMat);
                    l.rotation.x = -Math.PI / 2;
                    l.position.set(lx, 0.1, i * 100);
                    road.add(l);
                });
            }

            // Road Barriers (Neon)
            const barrierGeo = new THREE.BoxGeometry(2, 5, 4000);
            const barrierMatL = new THREE.MeshPhongMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 0.5 });
            const barrierMatR = new THREE.MeshPhongMaterial({ color: 0xff0044, emissive: 0xff0044, emissiveIntensity: 0.5 });

            const bl = new THREE.Mesh(barrierGeo, barrierMatL); bl.position.set(-51, 2, 0); road.add(bl);
            const br = new THREE.Mesh(barrierGeo, barrierMatR); br.position.set(51, 2, 0); road.add(br);

            scene.add(road);

            // Side Village Backdrops (bg.png)
            const bgPlaneGeo = new THREE.PlaneGeometry(400, 400);
            bgTex.wrapS = bgTex.wrapT = THREE.RepeatWrapping;
            bgTex.repeat.set(1, 1);

            for (let i = -5; i < 5; i++) {
                const lp = new THREE.Mesh(bgPlaneGeo, new THREE.MeshBasicMaterial({ map: bgTex, transparent: true }));
                lp.position.set(-250, 50, i * 400);
                lp.rotation.y = Math.PI / 2;
                road.add(lp);

                const rp = new THREE.Mesh(bgPlaneGeo, new THREE.MeshBasicMaterial({ map: bgTex, transparent: true }));
                rp.position.set(250, 50, i * 400);
                rp.rotation.y = -Math.PI / 2;
                road.add(rp);
            }
        }

        function createTree(z) {
            const tree = new THREE.Group();

            // Trunk
            const trunkGeo = new THREE.CylinderGeometry(2, 2, 15, 8);
            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x4d2600 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 7.5;
            tree.add(trunk);

            // Foliage
            const leafGeo = new THREE.SphereGeometry(12, 12, 12);
            const leafMat = new THREE.MeshPhongMaterial({ color: 0x228b22 });
            const leaf = new THREE.Mesh(leafGeo, leafMat);
            leaf.position.y = 20;
            tree.add(leaf);

            const side = Math.random() > 0.5 ? 1 : -1;
            tree.position.set(side * (70 + Math.random() * 50), 0, z);
            scene.add(tree);
            scenery.push(tree);
        }

        function createPlayer() {
            player = buildCar(0x00f2ff);
            player.lane = 1;
            player.targetX = 0;
            scene.add(player);
        }

        function buildCar(color, isEnemy = false) {
            const body = new THREE.Group();
            const chassisGeo = new THREE.BoxGeometry(10, 5, 18);
            const chassisMat = new THREE.MeshPhongMaterial({ map: carTex });
            const chassis = new THREE.Mesh(chassisGeo, chassisMat);
            chassis.position.y = 2.5;
            chassis.castShadow = true;
            body.add(chassis);

            const cabinGeo = new THREE.BoxGeometry(8, 2, 8);
            const cabinMat = new THREE.MeshPhongMaterial({ color: 0x000000, transparent: true, opacity: 0.6 });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 5, -1);
            body.add(cabin);

            // Wheels
            const wGeo = new THREE.CylinderGeometry(2, 2, 2, 12);
            const wMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            [[-5.2, 2, 6], [5.2, 2, 6], [-5.2, 2, -6], [5.2, 2, -6]].forEach(pos => {
                const w = new THREE.Mesh(wGeo, wMat);
                w.rotation.z = Math.PI / 2;
                w.position.set(...pos);
                body.add(w);
            });

            return body;
        }

        function spawnTraffic() {
            if (Math.random() < SETTINGS.trafficSpawnRate * (1 + currentSpeed / 2)) {
                const laneIdx = Math.floor(Math.random() * 3);
                const enemy = buildCar(0xff0044, true);
                enemy.position.set(SETTINGS.lanes[laneIdx], 0, camera.position.z + 1000);
                enemy.speed = currentSpeed * 0.4 + Math.random() * 0.5;
                scene.add(enemy);
                traffic.push(enemy);
            }
        }

        function update(delta) {
            if (gameState !== 'PLAYING') return;

            // MANUAL SPEED CONTROL (Up/Down)
            if (keys['ArrowUp']) {
                currentSpeed = Math.min(SETTINGS.maxSpeed, currentSpeed + SETTINGS.accelRate);
            } else if (keys['ArrowDown']) {
                currentSpeed = Math.max(-0.5, currentSpeed - SETTINGS.brakeRate); // Reverse supported
            } else {
                currentSpeed *= SETTINGS.friction; // Roll to stop
                if (Math.abs(currentSpeed) < 0.01) currentSpeed = 0;
            }

            // STEERING (Left decreases index, Right increases index)
            if ((keys['KeyA'] || keys['ArrowLeft']) && player.lane > 0 && !player.moving) {
                player.lane--; player.moving = true;
            }
            if ((keys['KeyD'] || keys['ArrowRight']) && player.lane < 2 && !player.moving) {
                player.lane++; player.moving = true;
            }

            player.targetX = SETTINGS.lanes[player.lane];
            player.position.x += (player.targetX - player.position.x) * 0.15;
            if (Math.abs(player.position.x - player.targetX) < 1) player.moving = false;

            // Tilt/Steer effect
            player.rotation.y = (player.targetX - player.position.x) * 0.01;
            player.rotation.z = (player.targetX - player.position.x) * 0.02;

            // ROAD SCROLLING
            road.position.z -= currentSpeed * 20;
            if (road.position.z < -100) road.position.z += 100;

            // DISTANCE & SCORE
            distance += currentSpeed;
            score += Math.max(0, Math.floor(currentSpeed * 2));

            // SCENERY SPAWNING (Trees)
            if (Math.random() < SETTINGS.treeSpawnFreq) {
                createTree(camera.position.z + 1500);
            }

            // TRAFFIC LOGIC
            spawnTraffic();
            for (let i = traffic.length - 1; i >= 0; i--) {
                const t = traffic[i];
                t.position.z -= (currentSpeed + t.speed) * 20;

                // Collision
                const dz = Math.abs(t.position.z - player.position.z);
                const dx = Math.abs(t.position.x - player.position.x);
                if (dz < 15 && dx < 8) {
                    gameState = 'GAMEOVER';
                }

                if (t.position.z < camera.position.z - 200) {
                    scene.remove(t);
                    traffic.splice(i, 1);
                }
            }

            // SCENERY CLEANUP
            for (let i = scenery.length - 1; i >= 0; i--) {
                const s = scenery[i];
                s.position.z -= currentSpeed * 20;
                if (s.position.z < camera.position.z - 200) {
                    scene.remove(s);
                    scenery.splice(i, 1);
                }
            }

            // Notify React UI
            window.dispatchEvent(new CustomEvent('gameUpdate', {
                detail: {
                    score: score,
                    distance: Math.floor(distance),
                    speed: Math.floor(currentSpeed * 80),
                    state: gameState
                }
            }));
        }

        function animate() {
            requestAnimationFrame(animate);
            update(clock.getDelta());
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>

</html>
