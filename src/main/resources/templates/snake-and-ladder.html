<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrix Snake & Ladder | Multiplayer</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- SockJS + STOMP (WebSocket) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700;900&display=swap');

        :root {
            --board-wood: #5d4037;
            --tile-light: #f3e5f5;
            --tile-dark: #e1bee7;
            --tile-accent: #d32f2f;
            --p1-color: #2196f3;
            --p2-color: #ff9800;
            --ladder-wood: #8d6e63;
            --snake-skin: #2e7d32;
        }

        body {
            background: #121212;
            color: #fff;
            font-family: 'Crimson Pro', serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        #root {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .game-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Board Styling */
        .board-outer {
            padding: 20px;
            background: var(--board-wood);
            border-radius: 15px;
            box-shadow:
                inset 0 0 50px rgba(0, 0, 0, 0.5),
                0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            transform-style: preserve-3d;
            perspective: 1500px;
        }

        .board-container {
            width: 600px;
            height: 600px;
            background: #fff;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            border: 10px solid #3e2723;
            position: relative;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .cell {
            border: 1px solid rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.6);
            position: relative;
            background: var(--tile-light);
            transition: transform 0.2s;
        }

        .cell.dark {
            background: var(--tile-dark);
        }

        .cell[data-num="1"],
        .cell[data-num="100"] {
            background: #ffd700 !important;
            color: #5d4037;
        }

        /* Physical Game Elements Overlay */
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Players (Pawns) */
        .player {
            width: 34px;
            height: 45px;
            position: absolute;
            z-index: 20;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 10px 5px rgba(0, 0, 0, 0.4));
        }

        .pawn-top {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .pawn-body {
            width: 26px;
            height: 32px;
            margin: -8px auto 0;
            clip-path: polygon(20% 100%, 80% 100%, 100% 80%, 100% 20%, 50% 0%, 0% 20%, 0% 80%);
            position: relative;
            z-index: 1;
        }

        .player-1 .pawn-top,
        .player-1 .pawn-body {
            background: var(--p1-color);
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent);
        }

        .player-2 .pawn-top,
        .player-2 .pawn-body {
            background: var(--p2-color);
            background-image: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), transparent);
        }

        /* Enhanced Ladder */
        .ladder-svg {
            filter: drop-shadow(0 5px 3px rgba(0, 0, 0, 0.3));
        }

        .ladder-rail {
            stroke: var(--ladder-wood);
            stroke-width: 6;
            stroke-linecap: round;
        }

        .ladder-rung {
            stroke: var(--ladder-wood);
            stroke-width: 4;
            stroke-linecap: round;
        }

        /* Enhanced Snake */
        .snake-svg {
            filter: drop-shadow(0 8px 6px rgba(0, 0, 0, 0.4));
        }

        .snake-body-path {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke: var(--snake-skin);
        }

        .snake-head {
            fill: var(--snake-skin);
        }

        /* UI Panel */
        .control-panel {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }

        .turn-indicator {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            transition: color 0.3s;
        }

        /* 3D Dice */
        .dice-box {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .dice {
            position: relative;
            width: 80px;
            height: 80px;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .dice-side {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 10px;
            box-sizing: border-box;
        }

        .dot {
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            place-self: center;
        }

        .side-1 {
            transform: translateZ(40px);
        }

        .side-2 {
            transform: rotateY(90deg) translateZ(40px);
        }

        .side-3 {
            transform: rotateY(180deg) translateZ(40px);
        }

        .side-4 {
            transform: rotateY(-90deg) translateZ(40px);
        }

        .side-5 {
            transform: rotateX(90deg) translateZ(40px);
        }

        .side-6 {
            transform: rotateX(-90deg) translateZ(40px);
        }

        .dice.rolling {
            animation: diceRoll 0.5s infinite linear;
        }

        @keyframes diceRoll {
            0% {
                transform: rotateX(0) rotateY(0) rotateZ(0);
            }

            100% {
                transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
            }
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .event-log {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-line {
            margin-bottom: 5px;
            color: #888;
        }

        .log-line.impact {
            color: #fff;
            border-left: 2px solid #fff;
            padding-left: 10px;
        }

        /* Chat styles */
        .chat-container {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 15px;
            height: 150px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 13px;
            text-align: left;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: #fff;
            font-family: inherit;
        }

        /* Modal */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .victory-text {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" th:inline="none">
        /*<![CDATA[*/
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        // Logic Maps
        const MAPS = {
            2: 38, 7: 14, 8: 31, 15: 26, 21: 42, 28: 84, 36: 44, 51: 67, 71: 91, 78: 98,
            16: 6, 46: 25, 49: 11, 62: 19, 64: 60, 74: 53, 89: 68, 92: 88, 95: 75, 99: 80
        };

        // ─── WebSocket Hook ──────────────────────────────────────────────
        function useSnakeSocket(roomId, onStateUpdate, onRollAnim, onChat) {
            const stompRef = useRef(null);

            useEffect(() => {
                if (!roomId) return;
                const socket = new SockJS('/ws');
                const stomp = Stomp.over(socket);
                stomp.debug = () => { };
                stompRef.current = stomp;

                stomp.connect({}, () => {
                    // Subscribe to game state
                    stomp.subscribe(`/topic/snake/${roomId}`, (msg) => {
                        onStateUpdate(JSON.parse(msg.body));
                    });
                    // Subscribe to dice roll animation trigger (so both players see dice roll)
                    stomp.subscribe(`/topic/snake/${roomId}/rollEvent`, (msg) => {
                        onRollAnim(JSON.parse(msg.body));
                    });
                    // Subscribe to chat
                    stomp.subscribe(`/topic/snake/${roomId}/chat`, (msg) => {
                        if (onChat) onChat(JSON.parse(msg.body));
                    });
                    // Request current state
                    stomp.send(`/app/snake/${roomId}/subscribe`, {}, "{}");
                });

                return () => stomp.disconnect();
            }, [roomId]);

            const sendRoll = (steps, playerNum) => {
                stompRef.current?.send(`/app/snake/${roomId}/roll`, {}, JSON.stringify({ steps, playerNum }));
            };
            const sendChat = (chatData) => {
                stompRef.current?.send(`/app/snake/${roomId}/chat`, {}, JSON.stringify(chatData));
            };

            return { sendRoll, sendChat };
        }

        // ─── Lobby & Waiting ─────────────────────────────────────────────
        function Lobby({ onEnterGame, playerName, setPlayerName }) {
            const [joinCode, setJoinCode] = useState("");
            const [err, setErr] = useState("");
            const [loading, setLoading] = useState(false);

            const handleCreate = async () => {
                if (!playerName.trim()) { setErr("Enter your name"); return; }
                setLoading(true);
                try {
                    const res = await fetch('/api/snake/create', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ playerName: playerName.trim() })
                    });
                    const data = await res.json();
                    onEnterGame(data.roomId, parseInt(data.playerNum), playerName.trim(), true);
                } catch (e) { setErr("Server error. Is Spring Boot running?"); }
                setLoading(false);
            };

            const handleJoin = async () => {
                if (!playerName.trim()) { setErr("Enter your name"); return; }
                const code = joinCode.trim().toUpperCase();
                if (!code) { setErr("Enter room code"); return; }
                setLoading(true);
                try {
                    const res = await fetch('/api/snake/join', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ roomId: code, playerName: playerName.trim() })
                    });
                    const data = await res.json();
                    if (data.error) { setErr(data.error); setLoading(false); return; }
                    onEnterGame(data.roomId, parseInt(data.playerNum), playerName.trim(), false);
                } catch (e) { setErr("Server error. Is Spring Boot running?"); }
                setLoading(false);
            };

            const wrap = {
                minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                padding: 20
            };
            const card = {
                background: "rgba(255, 255, 255, 0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 40, width: "100%", maxWidth: 440,
                boxShadow: "0 25px 50px rgba(0,0,0,0.5)", backdropFilter: "blur(20px)"
            };
            const input = { width: "100%", padding: "12px 16px", background: "#1a1a1a", border: "1px solid #444", borderRadius: 8, color: "#fff", fontFamily: "inherit", fontSize: 15, outline: "none", boxSizing: "border-box", marginBottom: 24 };

            return (
                <div style={wrap}>
                    <h1 style={{ fontSize: "3rem", fontWeight: 900, letterSpacing: "12px", textTransform: "uppercase", marginBottom: 0 }}>Zentrix</h1>
                    <p style={{ color: "#666", letterSpacing: "5px", marginBottom: "30px", fontWeight: 700 }}>SNAKE & LADDER MULTIPLAYER</p>
                    <div style={card}>
                        <label style={{ display: "block", marginBottom: 6, color: "#888" }}>Your Name</label>
                        <input style={input} value={playerName} onChange={e => setPlayerName(e.target.value)} placeholder="Enter your name…" maxLength={20} />
                        <button className="btn" style={{ marginBottom: 12 }} onClick={handleCreate} disabled={loading}>Create New Match</button>
                        <div style={{ display: "flex", alignItems: "center", gap: 12, margin: "8px 0 24px", color: "#888", fontSize: 12 }}>
                            <div style={{ flex: 1, height: 1, background: "#444" }} /><span>or join existing</span><div style={{ flex: 1, height: 1, background: "#444" }} />
                        </div>
                        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                            <input style={{ ...input, marginBottom: 0, textTransform: "uppercase", letterSpacing: 4 }} value={joinCode} onChange={e => setJoinCode(e.target.value)} placeholder="ROOM CODE" maxLength={6} />
                            <button className="btn" style={{ width: "auto", padding: "12px 20px" }} onClick={handleJoin} disabled={loading}>Join →</button>
                        </div>
                        {err && <div style={{ color: "#ff6666", fontSize: 12, textAlign: "center", marginTop: 8 }}>⚠ {err}</div>}
                    </div>
                    <a href="/games" style={{ color: "#888", fontSize: 13, marginTop: 24, textDecoration: "none", fontWeight: 700 }}><i className="fas fa-arrow-left"></i> BACK TO LIBRARY</a>
                </div>
            );
        }

        function WaitingRoom({ roomId }) {
            return (
                <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                    <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 48, textAlign: "center" }}>
                        <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: 3, marginBottom: 8 }}>Room Created!</div>
                        <div style={{ color: "#a0825a", fontSize: 13, marginBottom: 24 }}>Share this code with your friend</div>
                        <div style={{ fontSize: 52, fontWeight: 700, letterSpacing: 12, padding: "16px 32px", background: "#111", borderRadius: 12, marginBottom: 24, fontFamily: "monospace" }}>{roomId}</div>
                        <div style={{ color: "#a0825a", fontSize: 13, marginBottom: 20 }}>Waiting for opponent…</div>
                    </div>
                </div>
            );
        }

        // ─── Game Board & Rendering ──────────────────────────────────────
        function getCoord(num, isMobile = false) {
            if (num <= 0) return { x: -30, y: 560 }; // Off board initial spawn

            // Abstract grid calculation to avoid querying DOM purely based on React logic
            let row = Math.floor((num - 1) / 10);
            let col = (num - 1) % 10;

            let actualRow = 9 - row; // 0 is bottom row, 9 is top row

            // Zig-zag logic
            if (row % 2 !== 0) {
                col = 9 - col; // Reverse column on odd rows (from bottom)
            }

            // Grid is 600x600, each cell is roughly 58x58 with borders
            const CELL_SIZE = 58;
            const MARGIN = 10; // offset

            return {
                x: (col * CELL_SIZE) + MARGIN + 6, // center pawn
                y: (actualRow * CELL_SIZE) + MARGIN + 6
            };
        }

        function SnakeSVG() {
            const lines = [];
            const snakesAndLadders = Object.entries(MAPS);

            return (
                <svg id="game-overlay" viewBox="0 0 600 600">
                    {snakesAndLadders.map(([fromStr, to]) => {
                        let from = parseInt(fromStr);
                        const start = getCoord(from);
                        const end = getCoord(to);
                        const sx = start.x + 15, sy = start.y + 15;
                        const ex = end.x + 15, ey = end.y + 15;

                        if (to > from) {
                            // Ladder
                            const angle = Math.atan2(ey - sy, ex - sx);
                            const offset = 8;
                            const dx = offset * Math.sin(angle);
                            const dy = offset * Math.cos(angle);

                            const dist = Math.hypot(ex - sx, ey - sy);
                            const steps = Math.floor(dist / 20);
                            const rungs = [];
                            for (let i = 1; i < steps; i++) {
                                const px = sx + (ex - sx) * (i / steps);
                                const py = sy + (ey - sy) * (i / steps);
                                rungs.push(<line key={i} x1={px - dx} y1={py + dy} x2={px + dx} y2={py - dy} className="ladder-rung" />);
                            }

                            return (
                                <g key={`${from}-${to}`} className="ladder-svg">
                                    <line x1={sx - dx} y1={sy + dy} x2={ex - dx} y2={ey + dy} className="ladder-rail" />
                                    <line x1={sx + dx} y1={sy - dy} x2={ex + dx} y2={ey - dy} className="ladder-rail" />
                                    {rungs}
                                </g>
                            );
                        } else {
                            // Snake
                            const midX = (sx + ex) / 2 + (from % 2 === 0 ? 40 : -40);
                            const midY = (sy + ey) / 2;
                            const d = `M ${sx} ${sy} Q ${midX} ${midY}, ${ex} ${ey}`;
                            return (
                                <g key={`${from}-${to}`} className="snake-svg">
                                    <path d={d} className="snake-body-path" />
                                    <circle cx={sx} cy={sy} r="8" className="snake-head" />
                                </g>
                            );
                        }
                    })}
                </svg>
            );
        }

        function Game({ roomId, playerNum, playerName }) {
            const [state, setState] = useState(null);
            const [rolling, setRolling] = useState(false);
            const [diceVal, setDiceVal] = useState(1);
            const [logs, setLogs] = useState(["> Zentrix Engine Initialized.", "> Board: Standard 10x10.", "> Waiting for Players..."]);
            const [chatMsgs, setChatMsgs] = useState([]);
            const [chatInput, setChatInput] = useState("");
            const logRef = useRef(null);
            const chatRef = useRef(null);

            // Auto-scroll logs
            useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [logs]);
            useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [chatMsgs]);

            const pushLog = useCallback((msg, impact = false) => {
                setLogs(prev => [...prev, `> ${msg}`]);
            }, []);

            const onStateUpdate = useCallback((data) => {
                setState(data);
            }, []);

            const onRollAnim = useCallback((data) => {
                setRolling(true);
                // Spin for 1 sec
                setTimeout(() => {
                    setRolling(false);
                    setDiceVal(data.steps);
                    pushLog(`Player ${data.playerNum} rolled a ${data.steps}.`, true);
                    // State update from backend will naturally arrive shortly to move pieces
                }, 1000);
            }, [pushLog]);

            const onChat = useCallback((msg) => {
                setChatMsgs(prev => [...prev, msg]);
            }, []);

            const { sendRoll, sendChat } = useSnakeSocket(roomId, onStateUpdate, onRollAnim, onChat);

            if (!state) return <div style={{ marginTop: 100 }}>Connecting to match...</div>;

            const myTurn = state.turn === playerNum;
            const isGameOver = state.status === "finished";

            const handleRoll = () => {
                if (!myTurn || isGameOver || rolling) return;
                const steps = Math.floor(Math.random() * 6) + 1;
                // Inform backend instantly, which broadcasts the raw dice roll to trigger animation
                sendRoll(steps, playerNum);
            };

            const rotations = {
                1: 'rotateX(0deg) rotateY(0deg)',
                2: 'rotateX(0deg) rotateY(-90deg)',
                3: 'rotateX(0deg) rotateY(-180deg)',
                4: 'rotateX(0deg) rotateY(90deg)',
                5: 'rotateX(-90deg) rotateY(0deg)',
                6: 'rotateX(90deg) rotateY(0deg)'
            };
            const diceTransform = rolling ? undefined : rotations[diceVal]; // class handles animation if rolling

            // Board Generation
            const cells = [];
            for (let i = 0; i < 100; i++) {
                let row = Math.floor(i / 10);
                let col = i % 10;
                let actualRow = 9 - row; // 0-based from bottom
                let num = (actualRow % 2 === 0) ? (actualRow * 10) + col + 1 : (actualRow * 10) + (9 - col) + 1;

                let extraClass = (i % 2 === 0) ? "" : "dark";
                cells.push(
                    <div key={i} className={`cell ${extraClass}`} data-num={num}>
                        <span>{num}</span>
                    </div>
                );
            }

            // Pawn Positions
            const p1Coord = getCoord(state.p1Position);
            const p2Coord = getCoord(state.p2Position);

            // Visual names for turn indicator
            const p1Name = state.players?.["1"] || "Player 1";
            const p2Name = state.players?.["2"] || "Player 2";
            const activePlayerName = state.turn === 1 ? p1Name : p2Name;

            const sendChatMessage = () => {
                if (!chatInput.trim()) return;
                sendChat({ sender: playerName, text: chatInput.trim(), color: playerNum == 1 ? "w" : "b" });
                setChatInput("");
            };

            return (
                <div style={{ width: "100%", display: "flex", flexDirection: "column", alignItems: "center" }}>
                    <h1 style={{ fontSize: "3rem", fontWeight: 900, letterSpacing: "12px", textTransform: "uppercase", marginBottom: 0 }}>
                        Zentrix
                    </h1>
                    <p style={{ color: "#666", letterSpacing: "5px", marginBottom: "30px", fontWeight: 700 }}>MULTIPLAYER MATCH</p>

                    <div className="game-wrapper">
                        <div className="board-outer">
                            <div className="board-container" id="board">
                                {cells}
                                <SnakeSVG />

                                {/* Player 1 Pawn */}
                                <div id="p1-piece" className="player player-1" style={{ left: p1Coord.x, top: p1Coord.y }}>
                                    <div className="pawn-top"></div><div className="pawn-body"></div>
                                </div>

                                {/* Player 2 Pawn */}
                                <div id="p2-piece" className="player player-2" style={{ left: p2Coord.x + 15, top: p2Coord.y }}>
                                    <div className="pawn-top"></div><div className="pawn-body"></div>
                                </div>
                            </div>
                        </div>

                        <div className="control-panel">
                            <div className="card" style={{ padding: "20px 25px" }}>
                                <div className="turn-indicator" style={{ color: state.turn === 1 ? 'var(--p1-color)' : 'var(--p2-color)' }}>
                                    {activePlayerName}'s Turn
                                </div>
                                <div className="dice-box" onClick={handleRoll}>
                                    <div className={`dice ${rolling ? 'rolling' : ''}`} id="dice" style={{ transform: diceTransform }}>
                                        <div className="dice-side side-1"><div className="dot" style={{ gridArea: "2/2" }}></div></div>
                                        <div className="dice-side side-2"><div className="dot" style={{ gridArea: "1/1" }}></div><div className="dot" style={{ gridArea: "3/3" }}></div></div>
                                        <div className="dice-side side-3"><div className="dot" style={{ gridArea: "1/1" }}></div><div className="dot" style={{ gridArea: "2/2" }}></div><div className="dot" style={{ gridArea: "3/3" }}></div></div>
                                        <div className="dice-side side-4"><div className="dot" style={{ gridArea: "1/1" }}></div><div className="dot" style={{ gridArea: "1/3" }}></div><div className="dot" style={{ gridArea: "3/1" }}></div><div className="dot" style={{ gridArea: "3/3" }}></div></div>
                                        <div className="dice-side side-5"><div className="dot" style={{ gridArea: "1/1" }}></div><div className="dot" style={{ gridArea: "1/3" }}></div><div className="dot" style={{ gridArea: "2/2" }}></div><div className="dot" style={{ gridArea: "3/1" }}></div><div className="dot" style={{ gridArea: "3/3" }}></div></div>
                                        <div className="dice-side side-6"><div className="dot" style={{ gridArea: "1/1" }}></div><div className="dot" style={{ gridArea: "1/3" }}></div><div className="dot" style={{ gridArea: "2/1" }}></div><div className="dot" style={{ gridArea: "2/3" }}></div><div className="dot" style={{ gridArea: "3/1" }}></div><div className="dot" style={{ gridArea: "3/3" }}></div></div>
                                    </div>
                                </div>
                                <button className="btn" onClick={handleRoll} disabled={!myTurn || rolling || isGameOver}>
                                    {myTurn ? "Roll Dice" : "Waiting..."}
                                </button>
                            </div>

                            <div className="card event-log" ref={logRef}>
                                {logs.map((l, i) => <div key={i} className="log-line impact">{l}</div>)}
                            </div>

                            <div className="chat-container">
                                <div className="chat-messages" ref={chatRef}>
                                    {chatMsgs.map((m, i) => (
                                        <div key={i}><strong style={{ color: m.color === "w" ? "var(--p1-color)" : "var(--p2-color)" }}>{m.sender}:</strong> {m.text}</div>
                                    ))}
                                </div>
                                <div className="chat-input-row">
                                    <input className="chat-input" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendChatMessage()} placeholder="Trash talk..." />
                                    <button className="btn" style={{ padding: "8px 12px", width: "auto" }} onClick={sendChatMessage}>➤</button>
                                </div>
                            </div>

                            <button className="btn" style={{ background: "transparent", color: "#fff", border: "1px solid rgba(255,255,255,0.2)" }}
                                onClick={() => window.location.reload()}>Leave Match</button>
                        </div>
                    </div>

                    {isGameOver && (
                        <div className="overlay">
                            <h1 className="victory-text" style={{ color: state.p1Position >= 100 ? 'var(--p1-color)' : 'var(--p2-color)' }}>
                                {state.p1Position >= 100 ? p1Name : p2Name} WINS!
                            </h1>
                            <p style={{ letterSpacing: "10px", color: "#aaa", marginBottom: "40px" }}>SUPREME CHAMPION</p>
                            <button className="btn" style={{ maxWidth: "250px" }} onClick={() => window.location.reload()}>New Match</button>
                            <a href="/games" style={{ marginTop: "20px", color: "#666", textDecoration: "none" }}>Exit to Library</a>
                        </div>
                    )}
                </div>
            );
        }

        // ─── App Root ─────────────────────────────────────────────────────
        function App() {
            const [screen, setScreen] = useState("lobby");
            const [roomId, setRoomId] = useState(null);
            const [playerNum, setPlayerNum] = useState(null); // 1 or 2
            const [playerName, setPlayerName] = useState("");
            const [isCreator, setIsCreator] = useState(false);
            const [waitingRoomId, setWaitingRoomId] = useState(null);

            const handleEnterGame = (id, num, name, creator) => {
                setRoomId(id); setPlayerNum(num); setIsCreator(creator);
                if (creator) {
                    setWaitingRoomId(id);
                    setScreen("waiting");
                    setTimeout(() => setScreen("game"), 500); // Advance to game view that handles connection and rendering
                } else {
                    setScreen("game");
                }
            };

            if (screen === "lobby") return <Lobby onEnterGame={handleEnterGame} playerName={playerName} setPlayerName={setPlayerName} />;
            if (screen === "waiting") return <WaitingRoom roomId={waitingRoomId} />;
            if (screen === "game") return <Game roomId={roomId} playerNum={playerNum} playerName={playerName} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        /*]]>*/
    </script>
</body>

</html>
