<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
        body { margin: 0; background: #0f172a; color: #fff; font-family: 'Inter', sans-serif; }
        .memory-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; margin-top: 60px; }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; max-width: 600px; margin-bottom: 20px; padding: 15px 30px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 24px; font-weight: 900; color: #fbcc15; }
        
        .grid-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 600px; width: 100%; perspective: 1000px; }
        .card { aspect-ratio: 1; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1); border-radius: 12px; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card-back { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); border: 2px solid rgba(255,255,255,0.1); }
        .card-back::after { content: 'Z'; font-size: 32px; color: rgba(255,255,255,0.2); font-weight: 900; }
        .card-front { background: #fff; transform: rotateY(180deg); border: 2px solid #fbcc15; }
        
        .btn-restart { margin-top: 30px; padding: 12px 30px; background: linear-gradient(135deg, #fbcc15 0%, #eab308 100%); color: #000; font-weight: 800; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(250,204,21,0.3); }
    </style>
</head>

<body>
    <nav class="navbar" th:replace="~{fragments/template :: navbar('games')}"></nav>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const ICONS = ['🍎', '🍌', '🍉', '🍇', '🍓', '🍒', '🍑', '🍍'];

        const MemoryGame = () => {
            const [cards, setCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [matchedIndices, setMatchedIndices] = useState(new Set());
            const [moves, setMoves] = useState(0);
            const [bestScore, setBestScore] = useState(null);
            const [isLocked, setIsLocked] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem('memoryBestScore');
                if (saved) setBestScore(parseInt(saved, 10));
                initializeGame();
            }, []);

            const initializeGame = () => {
                const deck = [...ICONS, ...ICONS].sort(() => Math.random() - 0.5).map((icon, id) => ({ id, icon }));
                setCards(deck);
                setFlippedIndices([]);
                setMatchedIndices(new Set());
                setMoves(0);
                setIsLocked(false);
            };

            const handleCardClick = (index) => {
                if (isLocked || flippedIndices.includes(index) || matchedIndices.has(index)) return;

                const newFlipped = [...flippedIndices, index];
                setFlippedIndices(newFlipped);

                if (newFlipped.length === 2) {
                    setIsLocked(true);
                    setMoves(m => m + 1);
                    
                    const [first, second] = newFlipped;
                    if (cards[first].icon === cards[second].icon) {
                        const newMatched = new Set(matchedIndices);
                        newMatched.add(first);
                        newMatched.add(second);
                        setMatchedIndices(newMatched);
                        setFlippedIndices([]);
                        setIsLocked(false);

                        // Check Win
                        if (newMatched.size === cards.length) {
                            const finalMoves = moves + 1;
                            if (bestScore === null || finalMoves < bestScore) {
                                setBestScore(finalMoves);
                                localStorage.setItem('memoryBestScore', finalMoves.toString());
                            }
                            setTimeout(() => alert('You Won in ' + finalMoves + ' moves!'), 500);
                        }
                    } else {
                        setTimeout(() => {
                            setFlippedIndices([]);
                            setIsLocked(false);
                        }, 1000);
                    }
                }
            };

            return (
                <div className="memory-container">
                    <div className="stats-bar">
                        <div className="stat-item">
                            <div className="stat-label">Moves</div>
                            <div className="stat-value">{moves}</div>
                        </div>
                        <div className="stat-item">
                            <div className="stat-label">Best Score</div>
                            <div className="stat-value">{bestScore !== null ? bestScore : '-'}</div>
                        </div>
                    </div>

                    <div className="grid-board">
                        {cards.map((card, index) => {
                            const isFlipped = flippedIndices.includes(index) || matchedIndices.has(index);
                            return (
                                <div key={card.id} className={`card ${isFlipped ? 'flipped' : ''}`} onClick={() => handleCardClick(index)}>
                                    <div className="card-face card-back"></div>
                                    <div className="card-face card-front">{card.icon}</div>
                                </div>
                            );
                        })}
                    </div>

                    <button className="btn-restart" onClick={initializeGame}>Restart Game</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MemoryGame />);
    </script>
</body>
</html>
