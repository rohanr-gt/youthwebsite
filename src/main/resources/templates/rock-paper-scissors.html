<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Battle | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 120px auto 60px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .game-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .turn-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent);
            border: 1px solid var(--glass-border);
        }

        .choices-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .choice-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .choice-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: rgba(248, 68, 100, 0.05);
        }

        .choice-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .choice-card i {
            font-size: 48px;
            color: var(--accent);
        }

        .choice-card span {
            font-weight: 600;
            font-size: 16px;
        }

        .result-section {
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }

        .choice-display {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 20px;
        }

        .display-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .display-item span {
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .display-choice {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .final-result {
            font-size: 36px;
            font-weight: 800;
            margin-top: 10px;
            min-height: 54px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            font-family: 'Inter', sans-serif;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-val {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
        }

        .score-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .btn-action {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }

        .btn-action:hover {
            transform: scale(1.05);
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Zentrix</div>
        <div class="nav-links">
            <a href="/home">Home</a>
            <a href="/events">Events</a>
            <a href="/games" class="active">Games</a>
            <a href="/about">About Us</a>
            <a href="/support">Contact</a>
        </div>
        <a href="/dashboard" class="nav-btn">Dashboard</a>
    </nav>

    <div class="container" style="padding-top: 0;">
        <div class="game-container">
            <h1 class="game-title">RPS Local Battle</h1>

            <div class="score-board">
                <div class="score-item">
                    <span class="score-label">Player 1</span>
                    <span id="p1Score" class="score-val">0</span>
                </div>
                <div class="score-val">:</div>
                <div class="score-item">
                    <span class="score-label">Player 2</span>
                    <span id="p2Score" class="score-val">0</span>
                </div>
            </div>

            <div id="turnIndicator" class="turn-box">
                Player 1: Make your choice
            </div>

            <div id="choicesGrid" class="choices-grid">
                <div class="choice-card" onclick="makeChoice('Rock')">
                    <i class="fas fa-hand-rock"></i>
                    <span>Rock</span>
                </div>
                <div class="choice-card" onclick="makeChoice('Paper')">
                    <i class="fas fa-hand-paper"></i>
                    <span>Paper</span>
                </div>
                <div class="choice-card" onclick="makeChoice('Scissors')">
                    <i class="fas fa-hand-scissors"></i>
                    <span>Scissors</span>
                </div>
            </div>

            <div id="resultSection" class="result-section">
                <div class="choice-display">
                    <div class="display-item">
                        <span>P1 Chose</span>
                        <div id="p1Display" class="display-choice">—</div>
                    </div>
                    <div class="display-item">
                        <span>P2 Chose</span>
                        <div id="p2Display" class="display-choice">—</div>
                    </div>
                </div>
                <div id="result" class="final-result"></div>
                <button class="btn-action" onclick="nextRound()">Next Round</button>
            </div>

            <a href="/games" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Games</a>
        </div>
    </div>

    <script>
        let p1Choice = null;
        let p2Choice = null;
        let p1Score = 0;
        let p2Score = 0;
        let currentTurn = 1;

        function makeChoice(choice) {
            if (currentTurn === 1) {
                p1Choice = choice;
                currentTurn = 2;
                document.getElementById('turnIndicator').innerText = "Player 2: Make your choice";
                document.getElementById('turnIndicator').style.color = "#00f3ff"; // P2 Blue

                // Temporary visual feedback
                const cards = document.querySelectorAll('.choice-card');
                cards.forEach(card => {
                    card.style.borderColor = "var(--accent)";
                    setTimeout(() => card.style.borderColor = "var(--glass-border)", 200);
                });
            } else if (currentTurn === 2) {
                p2Choice = choice;
                showResult();
            }
        }

        function showResult() {
            document.getElementById('choicesGrid').style.display = 'none';
            document.getElementById('turnIndicator').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';

            document.getElementById('p1Display').innerText = p1Choice;
            document.getElementById('p2Display').innerText = p2Choice;

            const resultElement = document.getElementById('result');

            if (p1Choice === p2Choice) {
                resultElement.innerText = "It's a Draw 🤝";
                resultElement.style.color = "var(--text-secondary)";
            } else if (
                (p1Choice === 'Rock' && p2Choice === 'Scissors') ||
                (p1Choice === 'Paper' && p2Choice === 'Rock') ||
                (p1Choice === 'Scissors' && p2Choice === 'Paper')
            ) {
                resultElement.innerText = "Player 1 Wins! 🏆";
                resultElement.style.color = "var(--accent)";
                p1Score++;
            } else {
                resultElement.innerText = "Player 2 Wins! 🏆";
                resultElement.style.color = "#00f3ff";
                p2Score++;
            }

            document.getElementById('p1Score').innerText = p1Score;
            document.getElementById('p2Score').innerText = p2Score;
        }

        function nextRound() {
            p1Choice = null;
            p2Choice = null;
            currentTurn = 1;

            document.getElementById('choicesGrid').style.display = 'grid';
            document.getElementById('turnIndicator').style.display = 'block';
            document.getElementById('turnIndicator').innerText = "Player 1: Make your choice";
            document.getElementById('turnIndicator').style.color = "var(--accent)";
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>

</html>
